version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - ENV=development

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    # This ensures the React app can talk to the FastAPI backend locally
    environment:
      - VITE_API_URL=http://localhost:8000